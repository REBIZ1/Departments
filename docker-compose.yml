services:
  department_db:
    container_name: department_db
    image: postgres:16
    environment:
      POSTGRES_USER: test1
      POSTGRES_PASSWORD: test1
      POSTGRES_DB: department
    ports:
      - "6432:5432"
    volumes:
      - pg-department-data:/var/lib/postgresql/data
    networks:
      - myNetwork
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U test1 -d department" ]
      interval: 5s
      timeout: 5s
      retries: 5

  department_back_service:
    container_name: 'department_back'
    build:
      context: .
    ports:
      - "7777:8000"
    networks:
      - myNetwork
    env_file:
      - .env

networks:
  myNetwork:
    external: true

volumes:
  pg-department-data:
